<app-painel>
  <div class="painel">
    <p> Inclusão de Atendimento</p>
    <form [formGroup]="form" (ngSubmit)="onSalvar()">
      <div class="section1">
        <div class="btn-wrapper">
          <button class="btn-speciel" type="submit" [disabled]="form.invalid">Salvar</button>
          <span> ‎ </span>
          <button class="btn-speciel" type="button" (click)="oncancelar()">Cancelar</button>
        </div>
      </div>
      <div class="section2">
        <table class="example-full-width" cellspacing="0">
          <td>
            <tr>
              <mat-form-field class="placa-field" appearance="outline">
                <mat-label>Placa</mat-label>
                <input matInput formControlName="placa" aria-label="Placa" />
              </mat-form-field>
              <span> ‎ </span>
              <mat-form-field class="ordemexterna-field" appearance="outline">
                <mat-label>Ordem Externa</mat-label>
                <input matInput formControlName="ordemexterna" aria-label="Ordem Externa" />
                <mat-error *ngIf="form.get('ordemexterna')?.hasError('ordemInvalida')">
                  Ordem já registrada na base.
                </mat-error>               
              </mat-form-field>
            </tr>
            <tr>
              <mat-form-field class="km-field" appearance="outline">
                <mat-label>KM</mat-label>
                <input type="number" matInput formControlName="km" aria-label="KM" />
              </mat-form-field>
              <span> ‎ </span>
              <mat-form-field class="condutor-field" appearance="outline">
                <mat-label>Condutor</mat-label>
                <input matInput formControlName="condutor" aria-label="Condutor" />         
              </mat-form-field>
            </tr>
            <tr>
              <mat-form-field class="motivo-field" appearance="outline">
                <mat-label>Item</mat-label>
                <mat-select formControlName="codmotivo">
                  @for (item of dataMotivo; track item) {
                  <mat-option [value]="item.codigomot">{{item.motivo}}</mat-option>
                  }
                </mat-select>
              </mat-form-field>
            </tr>
            <tr>
              <mat-form-field appearance="outline" color="accent">
                <mat-label>Data Abertura</mat-label>
                <input matInput [matDatepicker]="picker" (input)="formatDate($event,'abertura')"
                  placeholder="DD/MM/AAAA" formControlName="abertura">
                <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
                <mat-datepicker #picker></mat-datepicker>
              </mat-form-field>
              <span> ‎ </span>
              <mat-form-field appearance="outline" color="accent">
                <mat-label>Entrada Oficina</mat-label>
                <input matInput [matDatepicker]="picker2" (input)="formatDate($event,'entrada')"
                  placeholder="DD/MM/AAAA" formControlName="entrada">
                <mat-datepicker-toggle matSuffix [for]="picker2"></mat-datepicker-toggle>
                <mat-datepicker #picker2></mat-datepicker>
              </mat-form-field>
            </tr>
            <tr>
              <mat-form-field class="servico-field" appearance="outline">
                <mat-label>Serviço</mat-label>
                <textarea matInput formControlName="servico" aria-label="Serviço"></textarea>
              </mat-form-field>
            </tr>
            <tr>
              <mat-form-field class="realizados-field" appearance="outline">
                <mat-label>Serviço Realizados</mat-label>
                <textarea matInput formControlName="realizados" aria-label="Serviço Realizados"></textarea>
              </mat-form-field>
            </tr>
          </td>
        </table>
      </div>
    </form>
  </div>
</app-painel>
